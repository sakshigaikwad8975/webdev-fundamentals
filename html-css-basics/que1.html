<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile card</title>
    <link rel="stylesheet" href="que1.css">
</head>
<body>
  <div class="page">
    <div class="card">
      <img src="fullstack.webp" alt="Profile photo">

      <section class="intro">
        <h1>Sakshi Gaikwad</h1>
        <p>Aspiring software engineer passionate about learning, problem solving, and building better products.</p>

        <p><strong>Languages:</strong></p>
        <ul>
          <li>HTML</li>
          <li>CSS</li>
          <li>JavaScript</li>
          <li>C++</li>
        </ul>
      </section>

      <div class="buttons">
        <button class="follow">Follow</button>
        <button class="message">Message</button>
      </div>
    </div>
  </div>
</body>

</html>
