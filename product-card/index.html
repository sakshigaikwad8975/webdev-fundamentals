<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Card</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <div class="cards">
        <div class="card">
            <img src="coffee.png" alt="Coffee Image">
            <h2>Coffee</h2>
            <p>Enjoy a rich and aromatic cup of coffee to start your day!</p>
            <p>$3.59</p>
            <div class="rating">
                <i class="fa-solid fa-star"></i> <i class="fa-solid fa-star"></i> <i class="fa-solid fa-star"></i><i class="fa-solid fa-star-half"></i>
            </div>
            <button type="button" class="buy-now">Buy Now</button>
        </div>

        <div class="card">
            <img src="cupcake.png" alt="Cupcake Image">
            <h2>Cupcake</h2>
            <p>Delicious and moist cupcake perfect for any sweet tooth!</p>
            <p>$2.99</p>
            <div class="rating">
                <i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-regular fa-star"></i>
            </div>
            <button type="button" class="buy-now">Buy Now</button>
        </div>

        <div class="card">
            <img src="icecream.png" alt="Ice Cream Image">
            <h2>Ice Cream</h2>
            <p>Refreshing and creamy ice cream to cool you down!</p>
            <p>$1.99</p>
            <div class="rating">
                <i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i>
            </div>
            <button type="button" class="buy-now">Buy Now</button>
        </div>

        <div class="card">
            <img src="milkshake.webp" alt="Milk Shake Image">
            <h2>Milk Shake</h2>
            <p> Creamy and delicious milk shake to satisfy your taste buds!</p>
            <p>$4.49</p>
            <div class="rating">
                <i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star-half"></i>
            </div>
            <button type="button" class="buy-now">Buy Now</button>
        </div>

    </div>
</body>
</html>
